<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Scientific Animism</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    <style>
      :root {
        --yellow: #f0d771dd;
        --pink: #d64a7b;
        --green: #d2e2a3;
        --black: #3d3d3a;
        --white: #fefefe;
        --smoke: #c7c6c0;
        --orange: #f2d5c4;
        color: var(--black);
        background: var(--white);
      }
      header {
        background: url(bg.webp) no-repeat top left / cover;
        height: 100vh;
        width: 100%;
        font-family: Charter, "Bitstream Charter", serif;
        color: var(--yellow);
        line-height: .65;
        letter-spacing: -17px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      header h1 {
        font-size: 35vmin;
        font-weight: normal;
        margin: 0;
      }
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><span>SCI</span><span>EN</span><wbr/><span>TIF</span><span>IC</span></h1>
      <h1 style="align-self: flex-end"><span>AN</span><span>I</span><wbr/><span>MI</span><span>SM</span></h1>
    </header>
  </body>
</html>
