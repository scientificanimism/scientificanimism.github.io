<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Scientific Animism</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    <style>
      :root {
        --yellow: #f0d771dd;
        --pink: #d64a7b;
        --green: #d2e2a3;
        --black: #3d3d3a;
        --white: #fefefe;
        --smoke: #c7c6c0;
        --orange: #f2d5c4;
        color: var(--black);
        background: var(--white);
      }
      header {
        background: url(bg.webp) no-repeat center center / cover;
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
      }
      header h1 {
        margin: 0;
      }
      header button {
        position: relative;
        transition: top, color 180ms;
        background: transparent;
        border: none;
        padding: 0;
        vertical-align: bottom;
        margin: 0;
        display: inline;
        font-family: Charter, "Bitstream Charter", serif;
        color: var(--yellow);
        line-height: .68;
        letter-spacing: -17px;
        font-size: 36vmin;
        font-weight: normal;
      }
      header button:hover,
      header button:focus,
      header button:active {
        top: 3px;
        color: var(--pink);
        cursor: pointer;
        z-index: 1;
      }
      header button:active {
        top: 6px;
      }
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><button>SCI</button><button>EN</button><button>TIF</button><button>IC</button></h1>
      <h1 style="text-align: right"><button>AN</button><button>I</button><button>MI</button><button>SM</button></h1>
    </header>
  </body>
</html>
