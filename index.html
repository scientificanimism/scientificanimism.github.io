<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scientific Animism</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Scientific Animism" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://scientificanimism.org/social.jpg" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scientific Animism" />
    <meta name="twitter:image" content="https://scientificanimism.org/social.jpg" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    <link rel="preload" href="audio/0 sci.ogg" as="fetch" crossorigin>
    <link rel="preload" href="audio/1 en.ogg" as="fetch" crossorigin>
    <link rel="preload" href="audio/2 ti.ogg" as="fetch" crossorigin>
    <link rel="preload" href="audio/3 fic.ogg" as="fetch" crossorigin>
    <link rel="preload" href="audio/4 a.ogg" as="fetch" crossorigin>
    <link rel="preload" href="audio/5 ni.ogg" as="fetch" crossorigin>
    <link rel="preload" href="audio/6 mis.ogg" as="fetch" crossorigin>
    <link rel="preload" href="audio/7 m.ogg" as="fetch" crossorigin>
    <style>
      :root {
        --yellow: #f0d771dd;
        --pink: #d64a7b;
        --green: #d2e2a3;
        --black: #3d3d3a;
        --white: #fefefe;
        --smoke: #c7c6c0;
        --orange: #f2d5c4;
        color: var(--black);
        background: var(--white);
      }
      header {
        background: url(bg.webp) no-repeat center center / cover;
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
      }
      header h1 {
        margin: 0;
      }
      header button {
        position: relative;
        transition: top, color 180ms;
        background: transparent;
        border: none;
        outline: none;
        padding: 0;
        vertical-align: bottom;
        margin: 0;
        display: inline;
        font-family: Charter, "Bitstream Charter", serif;
        color: var(--yellow);
        line-height: .70;
        clip-path: inset(0 -10px -15px);
        letter-spacing: -13px;
        font-size: 36vmin;
        font-weight: normal;
      }
      header button:hover,
      header button:focus,
      header button:active {
        top: 3px;
        color: var(--pink);
        cursor: pointer;
        z-index: 1;
      }
      header button:active {
        top: 6px;
      }
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="margin: -5px 0 0 -5px"><button>SCI</button><button>EN</button><button>TI</button><button>FIC</button></h1>
      <h1 style="text-align: right; margin-right: 5px"><button>A</button><button>NI</button><button>MIS</button><button>M</button></h1>
    </header>
    <script src="index.js"></script>
  </body>
</html>
